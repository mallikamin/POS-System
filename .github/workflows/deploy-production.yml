name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual triggering

env:
  SERVER_HOST: 159.65.158.26
  SERVER_USER: root
  DEPLOY_PATH: /root/pos-system

jobs:
  deploy:
    name: Build & Deploy to DigitalOcean
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --force --ignore-scripts

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: /api
          VITE_WS_URL: /ws
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Upload built frontend to server
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            frontend/dist/ \
            ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/frontend-dist/

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} << 'ENDSSH'

          cd /root/pos-system

          # Pull latest code from git
          git pull origin main || true

          # Copy pre-built frontend into frontend/dist
          rm -rf frontend/dist
          cp -r frontend-dist frontend/dist

          # Temporarily allow dist in dockerignore for prebuilt
          sed -i '/^dist$/d' frontend/.dockerignore

          # Build using lightweight prebuilt Dockerfile (no npm needed)
          docker build -t pos-system-frontend -f frontend/Dockerfile.prebuilt frontend/

          # Restore dockerignore
          echo "dist" >> frontend/.dockerignore

          # Recreate frontend container with new image
          docker compose -f docker-compose.demo.yml --env-file .env.demo up -d --no-deps --force-recreate frontend

          # Rebuild backend if code changed
          docker compose -f docker-compose.demo.yml --env-file .env.demo up -d --no-deps --build backend

          # Wait for services
          sleep 5

          # Check status
          docker compose -f docker-compose.demo.yml --env-file .env.demo ps

          echo "Deployment complete!"
          ENDSSH

      - name: Verify deployment
        run: |
          sleep 10
          curl -f https://pos-demo.duckdns.org/api/v1/health || exit 1
          echo "Health check passed!"

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
