name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ===========================================================================
  # Backend: Lint + Test
  # ===========================================================================
  backend:
    name: Backend - Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pos_test
          POSTGRES_USER: pos_test
          POSTGRES_PASSWORD: pos_test_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pos_test -d pos_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with Ruff
        run: |
          ruff check app/
          ruff format --check app/

      - name: Type check with mypy
        run: mypy app/ --ignore-missing-imports

      - name: Run tests
        env:
          ENVIRONMENT: testing
          DEBUG: "true"
          SECRET_KEY: ci-test-secret-key
          DATABASE_URL: postgresql+asyncpg://pos_test:pos_test_pass@localhost:5432/pos_test
          REDIS_URL: redis://localhost:6379/0
          CORS_ORIGINS: http://localhost
        run: |
          alembic upgrade head
          pytest -v --tb=short --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Upload coverage report
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  # ===========================================================================
  # Frontend: Lint + Type Check + Build
  # ===========================================================================
  frontend:
    name: Frontend - Lint & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        env:
          VITE_API_URL: http://localhost/api
          VITE_WS_URL: ws://localhost/ws
        run: npm run build

  # ===========================================================================
  # Docker: Verify images build successfully
  # ===========================================================================
  docker-build:
    name: Docker - Build Verification
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
