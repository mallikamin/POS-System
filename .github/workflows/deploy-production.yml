name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual triggering

env:
  SERVER_HOST: 159.65.158.26
  SERVER_USER: root
  DEPLOY_PATH: /root/pos-system

jobs:
  deploy:
    name: Build & Deploy to DigitalOcean
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --force --ignore-scripts

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: https://pos-demo.duckdns.org/api/v1
          VITE_WS_URL: wss://pos-demo.duckdns.org/ws
        run: npm run build

      - name: Create deployment package
        run: |
          mkdir -p deploy-package
          cp -r frontend/dist deploy-package/frontend-dist
          cp -r backend deploy-package/backend
          cp -r docker deploy-package/docker
          cp docker-compose.demo.yml deploy-package/
          cp .env.demo deploy-package/ || echo ".env.demo not in repo, will use server's existing file"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Upload to server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            deploy-package/ \
            ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ env.SERVER_USER }}@${{ env.SERVER_HOST }} << 'ENDSSH'

          cd ${{ env.DEPLOY_PATH }}

          # Backup current frontend
          docker commit pos-system-frontend-1 pos-system-frontend:backup-$(date +%Y%m%d-%H%M%S) || true

          # Copy built frontend to nginx container location
          rm -rf frontend/dist
          cp -r frontend-dist frontend/dist

          # Rebuild and restart only frontend (nginx static files)
          docker compose -f docker-compose.demo.yml --env-file .env.demo build --no-cache frontend
          docker compose -f docker-compose.demo.yml --env-file .env.demo up -d --no-deps --force-recreate frontend

          # Restart nginx to pick up new static files
          docker compose -f docker-compose.demo.yml --env-file .env.demo restart nginx || true

          # Wait for service to be healthy
          sleep 5

          # Check status
          docker compose -f docker-compose.demo.yml --env-file .env.demo ps

          echo "✅ Deployment complete!"
          ENDSSH

      - name: Verify deployment
        run: |
          sleep 10
          curl -f https://pos-demo.duckdns.org/api/v1/health || exit 1
          echo "✅ Health check passed!"

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
          rm -rf deploy-package
