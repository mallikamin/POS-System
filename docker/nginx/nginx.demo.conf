# =============================================================================
# Demo/Staging nginx config — HARDENED
# SSL certs from Let's Encrypt via certbot
# Last updated: 2026-02-15
# =============================================================================

# --- Rate limiting zones ---
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=global_limit:10m rate=100r/s;

# --- Connection limiting zone ---
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

# --- Bot blocking by User-Agent ---
# Returns 1 for bad bots, 0 for everyone else
map $http_user_agent $is_bad_bot {
    default 0;
    ~*(?i)(scrapy|nikto|sqlmap|nmap|masscan|dirbuster|gobuster|wfuzz)     1;
    ~*(?i)(zgrab|censys|shodan|crawler|spider|bot)                        1;
    ~*(?i)(python-requests|python-urllib|java\/|curl\/|wget\/)            1;
    ~*(?i)(nessus|openvas|qualys|burpsuite|hydra|medusa)                  1;
    ""                                                                     1;
}

upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:80;
}

# =============================================================================
# HTTP -> HTTPS redirect + ACME challenge
# =============================================================================
server {
    listen 80;
    server_name pos-demo.duckdns.org;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# Catch-all: reject requests for wrong Host header or direct IP access
# Prevents scanners hitting by IP from reaching the app
# =============================================================================
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate /etc/letsencrypt/live/pos-demo.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pos-demo.duckdns.org/privkey.pem;

    # 444 = nginx drops connection silently, no response
    return 444;
}

# =============================================================================
# HTTPS server — main application
# =============================================================================
server {
    listen 443 ssl;
    server_name pos-demo.duckdns.org;

    # ----- SSL -----
    ssl_certificate /etc/letsencrypt/live/pos-demo.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pos-demo.duckdns.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling (faster TLS handshake for clients)
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ----- Security Headers -----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://images.unsplash.com; font-src 'self' data:; connect-src 'self' wss://pos-demo.duckdns.org; frame-ancestors 'self';" always;

    # ----- General settings -----
    server_tokens off;
    client_max_body_size 5M;
    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;

    # Global connection limit per IP
    limit_conn conn_per_ip 20;
    limit_conn_status 429;

    # Global rate limit (catch-all, generous)
    limit_req zone=global_limit burst=200 nodelay;
    limit_req_status 429;

    # ----- Block bad bots -----
    if ($is_bad_bot) {
        return 444;
    }

    # ----- Block common scanner paths (silent drop) -----
    location ~* ^.*(\.php|\.asp|\.aspx|\.jsp|\.cgi|\.env|\.git|wp-login|wp-admin|xmlrpc|phpmyadmin|/shell|/cmd|/eval|/setup|/install|/config\.).*$ {
        access_log off;
        log_not_found off;
        return 444;
    }

    # ----- API -> FastAPI backend -----
    location /api/ {
        limit_req zone=api_limit burst=60 nodelay;
        limit_req_status 429;
        limit_conn conn_per_ip 10;

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Prevent proxy from buffering large responses into temp files
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 8k;
    }

    # ----- Login -> strict rate limit -----
    location /api/v1/auth/login {
        limit_req zone=login_limit burst=3 nodelay;
        limit_req_status 429;
        limit_conn conn_per_ip 3;

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
    }

    # ----- QuickBooks callback (needs longer timeout) -----
    location /api/v1/integrations/quickbooks/ {
        limit_req zone=api_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    # ----- WebSocket -----
    location /ws/ {
        # Limit WebSocket connections per IP
        limit_conn conn_per_ip 5;

        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ----- Frontend (React SPA) -----
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Static assets — long cache, immutable
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://frontend;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff" always;
        }
    }

    # ----- Block dotfiles -----
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
