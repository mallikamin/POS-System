[alembic]
# Path to migration scripts.
script_location = alembic

# Template used to generate migration file names.
# Uncomment the line below if you want the files to be named with the revision id.
# file_template = %%(rev)s_%%(slug)s

# Database URL — always overridden by env.py from DATABASE_URL environment variable.
# Intentionally left blank to avoid leaking credentials in config files.
sqlalchemy.url =

# sys.path in which the "alembic" package can be imported from.
prepend_sys_path = .

# Timezone to use when rendering the date within the migration file
# as well as the filename. Leave blank for localtime.
# timezone =

# Max length of characters to apply to the "slug" field.
# truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate.
# revision_environment = false

# Set to 'true' to allow .hierarchical_revision_numbers, which will use
# revision numbers that consist of a string-delimited number sequence.
# hierarchical_revision_numbers = false

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
